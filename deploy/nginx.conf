# Sales Portal - Nginx 설정 (HTTPS + 역방향 프록시)
# 설치 방법:
#   sudo cp /home/ubuntu/sales-portal/deploy/nginx.conf /etc/nginx/conf.d/sales-portal.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL 인증서는 Let's Encrypt(Certbot) 발급 후 경로 확인 필요:
#   sudo certbot --nginx -d sales.chamfood.co.kr

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name sales.chamfood.co.kr 140.245.76.188;

    location / {
        return 301 https://sales.chamfood.co.kr$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sales.chamfood.co.kr;

    # SSL 인증서 (Let's Encrypt Certbot 발급 경로)
    ssl_certificate     /etc/letsencrypt/live/sales.chamfood.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sales.chamfood.co.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 클라이언트 최대 업로드 크기
    client_max_body_size 50M;

    # Django 정적 파일 직접 서빙 (collectstatic 실행 후)
    location /static/ {
        alias /home/ubuntu/sales-portal/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Django API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 프론트엔드 (Next.js) - 그 외 모든 경로
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
