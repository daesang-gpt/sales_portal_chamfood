# Sales Portal 로그 로테이션 설정
# 사용법: sudo cp logrotate_sales_portal.conf /etc/logrotate.d/sales-portal
#         sudo chmod 644 /etc/logrotate.d/sales-portal

/opt/sales-portal/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 adm1003701 adm1003701
    sharedscripts
    postrotate
        # 필요시 서비스 재시작 명령 추가 가능
        # systemctl restart sales-portal || true
    endscript
}

