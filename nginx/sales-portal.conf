# Sales Portal - Nginx 역방향 프록시 (백엔드 + 프론트엔드) + 정적 파일 직접 서빙
# 설치: sudo cp /home/ubuntu/sales-portal/nginx/sales-portal.conf /etc/nginx/conf.d/
#       sudo nginx -t && sudo systemctl restart nginx
#
# 단일 80 포트: / → Next.js(3000), /api/, /admin/, /static/ → Django(8000) 또는 정적

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 168.107.7.140 _;

    # 백엔드 정적 파일 (Django admin CSS 등)
    location /static/ {
        alias /home/ubuntu/sales-portal/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Django API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 프론트엔드 (Next.js) - 그 외 모든 경로
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
